name: PR Review & Quality Gates

on:
  pull_request:
    branches: [ main ]
    types: [opened, synchronize, reopened, ready_for_review]

# Cancel previous runs on the same PR branch
concurrency:
  group: pr-review-${{ github.head_ref }}
  cancel-in-progress: true

jobs:
  # ── 1. Commit message format ────────────────────────────────────────────────
  conventional-commits:
    name: Conventional Commits
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Check commit messages
        run: |
          BASE="${{ github.event.pull_request.base.sha }}"
          HEAD="${{ github.event.pull_request.head.sha }}"
          PATTERN="^(feat|fix|docs|refactor|test|chore|style|perf|ci|build|revert)(\([a-z0-9_-]+\))?(!)?: .{1,100}$"

          FAILED=0
          while IFS= read -r msg; do
            # Skip merge commits, WIP, auto-generated
            echo "$msg" | grep -qE "^(Merge|WIP|fixup!|Co-Authored-By)" && continue
            if ! echo "$msg" | head -1 | grep -qE "$PATTERN"; then
              echo "❌ Bad commit message: $msg"
              FAILED=1
            fi
          done < <(git log --format="%s" "$BASE..$HEAD")

          if [ "$FAILED" = "1" ]; then
            echo ""
            echo "Fix: feat: | fix: | docs: | refactor: | chore: | test: | perf:"
            exit 1
          fi
          echo "✅ All commit messages follow Conventional Commits."

  # ── 2. No secrets in code ───────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: Scan for secrets
        run: |
          PATTERNS=(
            "AKIA[0-9A-Z]{16}"
            "dp\.st\.[a-zA-Z0-9]{40}"
            "ghp_[a-zA-Z0-9]{36}"
            "xoxb-[0-9]+-[0-9]+-[a-zA-Z0-9]+"
            "sk-[a-zA-Z0-9]{48}"
            "AIza[0-9A-Za-z_-]{35}"
            "cloudflare.*token.*=.*[a-zA-Z0-9]{37}"
          )
          FAILED=0
          for pattern in "${PATTERNS[@]}"; do
            if git diff origin/main...HEAD | grep -qE "$pattern"; then
              echo "❌ Possible secret detected (pattern: $pattern)"
              FAILED=1
            fi
          done
          if [ "$FAILED" = "1" ]; then
            echo "Remove secrets from code and use Doppler/env vars instead."
            exit 1
          fi
          echo "✅ No secrets detected."

  # ── 3. Python tests (if applicable) ────────────────────────────────────────
  python-tests:
    name: Python Tests
    runs-on: ubuntu-latest
    if: hashFiles('requirements.txt') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install deps
        run: pip install -r requirements.txt
      - name: Run tests
        run: python -m pytest -q --tb=short 2>/dev/null || echo "No tests found."

  # ── 4. JS/TS checks (if applicable) ────────────────────────────────────────
  js-checks:
    name: JS/TS Quality
    runs-on: ubuntu-latest
    if: hashFiles('package.json') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - run: npm ci --prefer-offline 2>/dev/null || npm install
      - name: TypeScript check
        run: npx tsc --noEmit 2>/dev/null || echo "No tsconfig found."
      - name: Lint
        run: npm run lint 2>/dev/null || echo "No lint script."

  # ── 5. Wrangler config check (Cloudflare Workers) ──────────────────────────
  workers-check:
    name: Cloudflare Workers Config
    runs-on: ubuntu-latest
    if: hashFiles('wrangler.toml') != '' || hashFiles('workers/wrangler.toml') != ''
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm install -g wrangler
      - name: Validate wrangler.toml
        run: |
          CONFIG=$(find . -name "wrangler.toml" | head -1)
          if [ -n "$CONFIG" ]; then
            wrangler deploy --dry-run --config "$CONFIG" 2>&1 | grep -v "^$" | head -20 || true
            echo "✅ wrangler.toml looks valid."
          fi

  # ── 6. PR summary comment ───────────────────────────────────────────────────
  pr-summary:
    name: PR Summary
    runs-on: ubuntu-latest
    needs: [conventional-commits, secret-scan]
    if: always()
    permissions:
      pull-requests: write
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const jobs = {
              'conventional-commits': '${{ needs.conventional-commits.result }}',
              'secret-scan':          '${{ needs.secret-scan.result }}',
            };
            const icon = r => r === 'success' ? '✅' : r === 'skipped' ? '⏭️' : '❌';
            const lines = Object.entries(jobs).map(([k,v]) => `| ${k} | ${icon(v)} ${v} |`);
            const body = [
              '## 🤖 Auto-Review Summary',
              '',
              '| Check | Status |',
              '|-------|--------|',
              ...lines,
              '',
              '_Automated by PR review workflow. Merge only after all checks pass._'
            ].join('\n');

            // Update existing comment or create new one
            const { data: comments } = await github.rest.issues.listComments({
              ...context.repo,
              issue_number: context.issue.number,
            });
            const existing = comments.find(c => c.body.includes('Auto-Review Summary'));
            if (existing) {
              await github.rest.issues.updateComment({
                ...context.repo,
                comment_id: existing.id,
                body,
              });
            } else {
              await github.rest.issues.createComment({
                ...context.repo,
                issue_number: context.issue.number,
                body,
              });
            }
